name: Auditoría SEO

on:
  # Corrida automática: todos los días a las 08:00 hora Argentina (11:00 UTC).
  schedule:
    - cron: "0 11 * * *"
  # Botón para dispararla a mano desde la pestaña Actions.
  workflow_dispatch:
    inputs:
      modo:
        description: "Cómo se descubren las páginas a auditar"
        type: choice
        options:
          - urls.txt
          - crawl
        default: urls.txt
      crawl_semilla:
        description: "URL semilla para --crawl (solo si modo=crawl)"
        default: "https://utnba.centrodeelearning.com/"
      crawl_max_paginas:
        description: "Tope de páginas a crawlear (solo si modo=crawl)"
        default: "80"

jobs:
  auditoria:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install ".[mail]"

      - name: Reconstruir el token de Gmail en disco
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Correr la auditoría
        env:
          MODO: ${{ inputs.modo || 'urls.txt' }}
          SEMILLA: ${{ inputs.crawl_semilla || 'https://utnba.centrodeelearning.com/' }}
          MAX_PAGINAS: ${{ inputs.crawl_max_paginas || '80' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO_IT: ${{ secrets.EMAIL_TO_IT }}
          EMAIL_TO_MARKETING: ${{ secrets.EMAIL_TO_MARKETING }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
        run: |
          if [ "$MODO" = "crawl" ]; then
            auditor-seo --crawl "$SEMILLA" --max-paginas "$MAX_PAGINAS"
          else
            auditor-seo urls.txt
          fi
