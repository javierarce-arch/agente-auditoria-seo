name: Auditoría SEO

on:
  # Corrida automática: todos los días a las 08:00 hora Argentina (11:00 UTC).
  schedule:
    - cron: "0 11 * * *"
  # Botón para dispararla a mano desde la pestaña Actions.
  workflow_dispatch:
    inputs:
      modo:
        description: "Cómo se descubren las páginas a auditar"
        type: choice
        options:
          - urls.txt
          - crawl
        default: urls.txt
      crawl_semilla:
        description: "URL semilla para --crawl (solo si modo=crawl)"
        default: "https://utnba.centrodeelearning.com/"
      crawl_max_paginas:
        description: "Tope de páginas a crawlear (solo si modo=crawl)"
        default: "80"

jobs:
  auditoria:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install ".[mail]"

      - name: Reconstruir el token de Gmail en disco
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Correr la auditoría
        env:
          MODO: ${{ inputs.modo || 'urls.txt' }}
          SEMILLA: ${{ inputs.crawl_semilla || 'https://utnba.centrodeelearning.com/' }}
          MAX_PAGINAS: ${{ inputs.crawl_max_paginas || '80' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO_IT: ${{ secrets.EMAIL_TO_IT }}
          EMAIL_TO_MARKETING: ${{ secrets.EMAIL_TO_MARKETING }}
          # URL fija del sitio de Pages (ver step "Publicar en GitHub Pages" más abajo):
          # se linkea en el mail aunque el deploy todavía no haya corrido en esta misma
          # corrida, porque para cuando alguien abre el mail ya está publicado.
          REPORT_URL: "https://javierarce-arch.github.io/agente-auditoria-seo/"
        run: |
          if [ "$MODO" = "crawl" ]; then
            auditor-seo --crawl "$SEMILLA" --max-paginas "$MAX_PAGINAS"
          else
            auditor-seo urls.txt
          fi

      - name: Guardar el reporte
        # Se guarda siempre, incluso si la auditoría falló (así ves qué pasó).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-auditoria
          path: |
            report.md
            report.json
            report.html

      - name: Preparar sitio para Pages
        if: always()
        run: |
          mkdir -p _site
          if [ -f report.html ]; then
            cp report.html _site/index.html
          else
            echo "<html><body>No se generó report.html en esta corrida.</body></html>" > _site/index.html
          fi

      - name: Subir artifact de Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar en GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
