name: Auditoría SEO quincenal (sitio completo)

# Auditoría completa del sitio vía crawler, cada ~15 días (días 1 y 16 de cada
# mes — cron no tiene una expresión nativa para "cada 15 días" porque los
# meses no son múltiplos de 15). Esta corrida es la fuente de verdad de
# data/estado_alta.json: reemplaza el estado completo con las URLs que
# quedaron con severidad ALTA, para que auditoria_diaria.yml sepa qué
# rechequear el resto de los días.
on:
  schedule:
    - cron: "0 11 1,16 * *"
  workflow_dispatch:
    inputs:
      crawl_semilla:
        description: "URL semilla para el crawl"
        default: "https://utnba.centrodeelearning.com/"
      crawl_max_paginas:
        description: "Tope de páginas a crawlear"
        default: "80"

concurrency:
  group: auditoria-seo-estado
  cancel-in-progress: false

jobs:
  auditoria:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install ".[mail,gsc]"

      - name: Reconstruir el token de Gmail en disco
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Reconstruir credenciales de Search Console en disco
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GSC_SERVICE_ACCOUNT_JSON" > credentials/gsc_service_account.json

      - name: Correr la auditoría completa (crawl)
        env:
          SEMILLA: ${{ inputs.crawl_semilla || 'https://utnba.centrodeelearning.com/' }}
          MAX_PAGINAS: ${{ inputs.crawl_max_paginas || '80' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO_IT: ${{ secrets.EMAIL_TO_IT }}
          EMAIL_TO_MARKETING: ${{ secrets.EMAIL_TO_MARKETING }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_CREDENTIALS_JSON: credentials/gsc_service_account.json
        run: auditor-seo --crawl "$SEMILLA" --max-paginas "$MAX_PAGINAS"

      - name: Actualizar data/estado_alta.json si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/estado_alta.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el estado; no se commitea."
            exit 0
          fi
          git commit -m "chore(estado): actualiza data/estado_alta.json (auditoría quincenal) [skip ci]"
          git push origin HEAD:main
